<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="80" fill="#4A7C59"/>
  <!-- 数字 123 -->
  <text x="256" y="280" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="200" font-weight="bold"
        fill="#FFFFFF">123</text>
  <!-- 下划线装饰 -->
  <rect x="100" y="320" width="312" height="12" rx="6" fill="#FFD700" opacity="0.8"/>
  <!-- 元符号 -->
  <text x="256" y="410" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="80" font-weight="bold"
        fill="#FFD700">元</text>
</svg>
